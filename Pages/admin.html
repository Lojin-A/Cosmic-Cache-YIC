<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Cache YIC - Admin Dashboard</title>
    <link rel="stylesheet" href="../Assets/CSS/style.css">
</head>
<body>

    <main class="os-window">
        
        <header class="window-topbar">
            <a href="#" class="title-link">
                <div class="title-group">
                    <img src="../Assets/Media/pixel_sparkle.png" alt="icon" class="title-icon">
                    <div class="window-title">Cosmic Cache YIC</div>
                </div>
            </a>
            <nav class="top-nav">
                <a href="index_logged_out.html" class="nav-pill logout-pill">Log out</a>
            </nav>
        </header>

        <section class="welcome-section">
            <h2 class="greeting">Welcome Admin!</h2>
        </section>

        <section class="card-container">
            
            <div class="action-card">
                <h3 class="form-title" style="margin-bottom: 10px; font-size: 28px;">Pending Item Posts</h3>
                
                <div class="scroll-box">
                    
                    <div class="admin-item">
                        <div class="image-area" style="width: 120px; height: 120px; margin: 0 auto 15px auto;">
                            <img src="../Assets/Media/lost.jpeg" style="height: 100%; width: 100%; object-fit: contain;">
                        </div>
                        <p style="color: #31365a; font-size: 20px;">ID: <strong>L042</strong></p>
                        <p style="color: #31365a; font-size: 20px;">Type: <strong>Lost</strong></p>
                        <p style="color: #31365a; font-size: 20px;">Item: <strong>Keys</strong></p>
                        <div class="btn-group">
                             <button class="card-btn admin-btn">Accept</button>
                             <button class="card-btn admin-btn deny-btn">Deny</button>
                        </div>
                    </div>

                    <div class="admin-item">
                        <p style="color: #31365a; font-size: 20px;">ID: <strong>F019</strong></p>
                        <p style="color: #31365a; font-size: 20px;">Type: <strong>Found</strong></p>
                        <p style="color: #31365a; font-size: 20px;">Item: <strong>Math Textbook</strong></p>
                        <div class="btn-group">
                            <button class="card-btn admin-btn">Accept</button>
                            <button class="card-btn admin-btn deny-btn">Deny</button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="action-card">
                <h3 class="form-title" style="margin-bottom: 10px; font-size: 28px;">Pending Claim Requests</h3>
                
                <div class="scroll-box">
                    <div class="admin-item">
                        <p style="color: #31365a; font-size: 20px;">Target Item: <strong>Keys</strong></p>
                        <p style="color: #31365a; font-size: 20px;">Item ID: <strong>F012</strong></p>
                        <p style="color: #31365a; font-size: 20px;">Claimed by: <strong>Jana</strong></p>
                        <div class="btn-group">
                            <button class="card-btn admin-btn">Approve</button>
                            <button class="card-btn admin-btn deny-btn">Reject</button>
                        </div>
                    </div>
                </div>
            </div>

        </section>

        <footer class="window-footer">
            Cosmic Cache YIC © 2026 | Developed by Lojin & Jana
        </footer>

    </main>

    <script src="../Assets/JS/script.js"></script>
</body>
</html>
